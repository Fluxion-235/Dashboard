<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Onyx Dash</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #000000;
  --surface: #0a0a0c;
  --surface-lift: #121216;
  --border: rgba(255, 255, 255, 0.04);
  --border-bright: rgba(255, 255, 255, 0.1);
  --text: #ffffff;
  --text-dim: #71717a;
  --accent: #6366f1;
  --accent-alt: #8b5cf6;
  --accent-cyan: #06b6d4;
  --radius-xl: 32px;
  --radius-lg: 20px;
  --radius-md: 12px;
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Plus Jakarta Sans', sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  padding-bottom: 80px;
}

/* ── Header ── */
#hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 80px;
  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 1000;
}

.logo-text {
  font-size: 18px; font-weight: 800; letter-spacing: 0.2em;
  background: linear-gradient(to right, #fff, var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

#location-trigger {
  background: var(--surface); border: 1px solid var(--border);
  padding: 8px 16px; border-radius: 100px;
  font-size: 12px; font-weight: 700; color: var(--text-dim);
  cursor: pointer; transition: var(--transition);
  display: flex; align-items: center; gap: 8px;
}
#location-trigger:hover { border-color: var(--accent); color: #fff; }

/* ── Main Layout ── */
#main { padding: 24px; max-width: 1400px; margin: 0 auto; }

.section-grid { display: grid; grid-template-columns: 1fr; gap: 24px; margin-bottom: 24px; }
@media (min-width: 1024px) { .section-grid.weather { grid-template-columns: 1.5fr 1fr; } }

/* ── Cards ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  transition: var(--transition);
}

.card-title {
  font-size: 10px; font-weight: 800; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.1em;
  margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
}
.card-title::after { content: ''; height: 1px; flex: 1; background: var(--border); }

/* ── Weather ── */
.w-hero { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px; }
.w-main { display: flex; align-items: center; gap: 24px; }
.w-icon { font-size: 64px; }
.w-temp { font-size: 72px; font-weight: 200; }
.w-meta { text-align: right; }
.w-city { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.w-desc { color: var(--accent-cyan); font-weight: 700; font-size: 13px; }

.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.stat-box { background: var(--bg); padding: 16px; border-radius: var(--radius-md); border: 1px solid var(--border); }
.stat-label { font-size: 9px; font-weight: 800; color: var(--text-dim); margin-bottom: 4px; }
.stat-value { font-size: 20px; font-weight: 700; }

/* ── Charts ── */
.charts-container { display: grid; grid-template-columns: 1fr; gap: 24px; }
@media (min-width: 768px) { .charts-container { grid-template-columns: 1fr 1fr; } }
.chart-card { height: 300px; }

/* ── Forecast ── */
#forecast-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 12px; }
.fc-item {
  background: var(--surface-lift); padding: 20px 12px; border-radius: var(--radius-md);
  text-align: center; border: 1px solid var(--border);
}
.fc-day { font-size: 10px; font-weight: 800; color: var(--text-dim); margin-bottom: 8px; }
.fc-icon { font-size: 24px; margin: 8px 0; }
.fc-temp { font-size: 16px; font-weight: 700; }

/* ── News ── */
.news-grid { display: grid; grid-template-columns: 1fr; gap: 24px; }
@media (min-width: 768px) { .news-grid { grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); } }
.news-tile { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 24px; }
.news-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
.news-item:last-child { border: none; }
.news-item a { color: #fff; text-decoration: none; font-weight: 600; font-size: 14px; display: block; margin-bottom: 4px; transition: var(--transition); }
.news-item a:hover { color: var(--accent); }
.news-src { font-size: 9px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; }

/* ── Location Menu ── */
#loc-menu {
  position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9);
  backdrop-filter: blur(20px); z-index: 2000;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  padding: 24px; animation: fadeIn 0.3s ease;
}
#loc-menu.open { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.menu-box { width: 100%; max-width: 440px; }
.menu-title { font-size: 24px; font-weight: 800; margin-bottom: 32px; text-align: center; }

.search-input-group { display: flex; gap: 12px; margin-bottom: 24px; }
.search-input {
  flex: 1; background: var(--surface-lift); border: 1px solid var(--border-bright);
  padding: 16px 20px; border-radius: 16px; color: #fff; font-family: inherit; font-size: 15px;
}
.btn-action {
  background: var(--accent); color: #fff; border: none; padding: 0 24px;
  border-radius: 16px; font-weight: 700; cursor: pointer; transition: var(--transition);
}
.btn-action.sec { background: var(--surface-lift); border: 1px solid var(--border-bright); }
.btn-action:hover { transform: translateY(-2px); opacity: 0.9; }

.results-list { max-height: 240px; overflow-y: auto; margin-bottom: 24px; border-radius: 16px; background: var(--surface-lift); }
.res-item { padding: 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
.res-item:hover { background: rgba(255,255,255,0.03); }
.res-name { font-weight: 700; font-size: 14px; }
.res-meta { font-size: 11px; color: var(--text-dim); }

.coords-row { display: flex; gap: 12px; margin-bottom: 32px; }
.coord-input { flex: 1; background: var(--surface-lift); border: 1px solid var(--border); padding: 12px; border-radius: 12px; color: #fff; font-size: 13px; text-align: center; }

/* ── Status ── */
#statusbar {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(10, 10, 12, 0.8); border: 1px solid var(--border);
  padding: 10px 20px; border-radius: 100px; backdrop-filter: blur(10px);
  font-size: 10px; font-weight: 800; color: var(--text-dim); display: flex; align-items: center; gap: 8px; z-index: 100;
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: #3f3f46; }
.status-dot.ok { background: var(--accent-cyan); box-shadow: 0 0 10px var(--accent-cyan); }

/* ── Utils ── */
.shimmer { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent); background-size: 200% 100%; animation: shim 1.5s infinite; }
@keyframes shim { from { background-position: 200% 0; } to { background-position: -200% 0; } }
.hidden { display: none !important; }

@media (max-width: 640px) {
  #hdr { padding: 0 16px; }
  .logo-text { font-size: 16px; }
  #main { padding: 16px; }
  .w-temp { font-size: 56px; }
  .w-icon { font-size: 48px; }
  .card { padding: 16px; }
  .fc-item { padding: 12px 8px; }
}
</style>
</head>
<body>

<div id="hdr">
  <div class="logo-text">ONYX DASH</div>
  <div id="location-trigger" onclick="toggleMenu()">
    <span id="loc-name">SETTING LOCATION...</span>
  </div>
  <div id="clock" style="font-size:11px; font-weight:700; color:var(--text-dim)"></div>
</div>

<div id="loc-menu" onclick="if(event.target===this)toggleMenu()">
  <div class="menu-box">
    <div class="menu-title">SELECT LOCATION</div>
    <div class="search-input-group">
      <input id="inp-city" class="search-input" placeholder="CITY NAME..." value="Negombo" onkeyup="if(event.key==='Enter')searchCity()" />
      <button class="btn-action" onclick="searchCity()">FIND</button>
    </div>
    <div id="search-results" class="results-list hidden"></div>
    <div class="coords-row">
      <input id="inp-lat" class="coord-input" type="number" step="0.0001" value="7.2096" placeholder="LAT" />
      <input id="inp-lon" class="coord-input" type="number" step="0.0001" value="79.8378" placeholder="LON" />
    </div>
    <div style="display:flex; gap:12px">
      <button class="btn-action sec" style="flex:1" onclick="toggleMenu()">CANCEL</button>
      <button class="btn-action" style="flex:1.5" onclick="applyLocation()">SAVE & SYNC</button>
    </div>
  </div>
</div>

<div id="main">
  <div class="section-grid weather">
    <div class="card w-hero" id="w-hero">
      <div class="shimmer" style="height:80px; width:200px; border-radius:12px"></div>
    </div>
    <div class="card">
      <div class="card-title">METRICS</div>
      <div class="stats-grid" id="w-stats">
        <div class="stat-box shimmer" style="height:60px"></div>
        <div class="stat-box shimmer" style="height:60px"></div>
      </div>
    </div>
  </div>

  <div class="charts-container">
    <div class="card chart-card">
      <div class="card-title">PRECIPITATION % (24H)</div>
      <div style="height:220px"><canvas id="rainChart"></canvas></div>
    </div>
    <div class="card chart-card">
      <div class="card-title">TEMPERATURE ° (24H)</div>
      <div style="height:220px"><canvas id="tempChart"></canvas></div>
    </div>
  </div>

  <div class="card" style="margin: 24px 0">
    <div class="card-title">7-DAY OUTLOOK</div>
    <div id="forecast-row"></div>
  </div>

  <div class="card-title" style="margin-bottom:24px">INTELLIGENCE TILES</div>
  <div class="news-grid" id="news-grid"></div>

  <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap:24px; margin-top:24px">
    <div class="card">
      <div class="card-title">AIR QUALITY</div>
      <div id="aqi-content"></div>
    </div>
    <div class="card">
      <div class="card-title">SOLAR STATUS</div>
      <div id="sun-content"></div>
    </div>
  </div>
</div>

<div id="statusbar">
  <div class="status-dot" id="status-dot"></div>
  <span id="status-text">WAITING</span>
</div>

<script>
const API = window.location.origin;
let newsData = {}, rainInst = null, tempInst = null;
const ICONS = { sunny:'☀️', cloudy:'⛅', rain:'🌧️', snow:'❄️', fog:'🌫️', thunder:'⛈️' };
const DAYS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent = n.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', hour12:true }).toUpperCase();
}
setInterval(updateClock, 1000);
updateClock();

function toggleMenu() {
  document.getElementById('loc-menu').classList.toggle('open');
  document.getElementById('search-results').classList.add('hidden');
}

async function searchCity() {
  const q = document.getElementById('inp-city').value;
  if(!q) return;
  const resDiv = document.getElementById('search-results');
  resDiv.classList.remove('hidden');
  resDiv.innerHTML = '<div style="padding:16px; color:var(--text-dim); font-size:12px">QUERYING...</div>';
  try {
    const r = await fetch(`${API}/api/geocode?q=${encodeURIComponent(q)}`);
    const data = await r.json();
    if(!data.length) { resDiv.innerHTML = '<div style="padding:16px">NO MATCH</div>'; return; }
    resDiv.innerHTML = data.map(res => `
      <div class="res-item" onclick="selectCity(${res.latitude}, ${res.longitude}, '${res.name}')">
        <div class="res-name">${res.name.toUpperCase()}</div>
        <div class="res-meta">${res.country.toUpperCase()}</div>
      </div>
    `).join('');
  } catch(e) { resDiv.innerHTML = '<div style="padding:16px">ERROR</div>'; }
}

function selectCity(lat, lon, name) {
  document.getElementById('inp-lat').value = lat.toFixed(4);
  document.getElementById('inp-lon').value = lon.toFixed(4);
  document.getElementById('inp-city').value = name;
  document.getElementById('search-results').classList.add('hidden');
}

function applyLocation() {
  toggleMenu();
  loadAll();
}

function renderWeather(d) {
  document.getElementById('loc-name').textContent = d.city.toUpperCase();
  document.getElementById('w-hero').innerHTML = `
    <div class="w-main">
      <div class="w-icon">${ICONS[d.icon_type] || '🌡️'}</div>
      <div class="w-temp">${Math.round(d.temperature)}°</div>
    </div>
    <div class="w-meta">
      <div class="w-city">${d.city.toUpperCase()}</div>
      <div class="w-desc">${d.description.toUpperCase()}</div>
    </div>
  `;

  document.getElementById('w-stats').innerHTML = `
    <div class="stat-box"><div class="stat-label">FEELS LIKE</div><div class="stat-value">${Math.round(d.feels_like)}°</div></div>
    <div class="stat-box"><div class="stat-label">HUMIDITY</div><div class="stat-value">${d.humidity}%</div></div>
    <div class="stat-box"><div class="stat-label">WIND SPEED</div><div class="stat-value">${Math.round(d.wind_speed)}<span style="font-size:10px">KM/H</span></div></div>
    <div class="stat-box"><div class="stat-label">RAIN PROB</div><div class="stat-value">${d.rain_chance}%</div></div>
  `;

  document.getElementById('sun-content').innerHTML = `
    <div style="display:flex; justify-content:space-between; margin-bottom:12px"><span>SUNRISE</span><span style="font-weight:800; color:var(--accent-cyan)">${d.forecast[0].sunrise.split('T')[1].slice(0,5)}</span></div>
    <div style="display:flex; justify-content:space-between"><span>SUNSET</span><span style="font-weight:800; color:var(--accent-cyan)">${d.forecast[0].sunset.split('T')[1].slice(0,5)}</span></div>
  `;

  document.getElementById('forecast-row').innerHTML = d.forecast.map((f, i) => `
    <div class="fc-item" style="${i===0?'border-color:var(--accent)':''}">
      <div class="fc-day">${i===0?'NOW':DAYS[new Date(f.date).getDay()]}</div>
      <div class="fc-icon">${ICONS[f.icon_type]}</div>
      <div class="fc-temp">${Math.round(f.max_temp)}°</div>
    </div>
  `).join('');

  renderCharts(d);
}

function renderCharts(d) {
  const labels = d.hourly_times.map(t => t.split('T')[1].slice(0,5));
  const opts = {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      y: { grid: { color: 'rgba(255,255,255,0.02)' }, ticks: { color: '#3f3f46', font: { size: 9, weight: '700' } } },
      x: { grid: { display: false }, ticks: { color: '#3f3f46', maxTicksLimit: 6, font: { size: 9, weight: '700' } } }
    }
  };

  if (rainInst) rainInst.destroy();
  rainInst = new Chart(document.getElementById('rainChart'), {
    type: 'line',
    data: { labels, datasets: [{ data: d.hourly_rain, borderColor: '#6366f1', backgroundColor: 'rgba(99, 102, 241, 0.05)', fill: true, tension: 0.4, pointRadius: 0 }] },
    options: opts
  });

  if (tempInst) tempInst.destroy();
  tempInst = new Chart(document.getElementById('tempChart'), {
    type: 'line',
    data: { labels, datasets: [{ data: d.hourly_temp, borderColor: '#8b5cf6', backgroundColor: 'rgba(139, 92, 246, 0.05)', fill: true, tension: 0.4, pointRadius: 0 }] },
    options: opts
  });
}

function renderAQI(d) {
  const aqi = d.aqi || 0;
  const color = aqi <= 50 ? '#06b6d4' : aqi <= 100 ? '#f59e0b' : '#ef4444';
  document.getElementById('aqi-content').innerHTML = `
    <div style="font-size:48px; font-weight:800; color:${color}">${aqi}</div>
    <div style="font-size:10px; font-weight:800; color:var(--text-dim)">AIR QUALITY STATUS</div>
    <div style="margin-top:16px; height:2px; background:rgba(255,255,255,0.05); border-radius:10px; overflow:hidden">
      <div style="width:${Math.min(100, aqi/2)}%; height:100%; background:${color}"></div>
    </div>
  `;
}

function renderNews() {
  document.getElementById('news-grid').innerHTML = Object.entries(newsData).map(([c, data]) => `
    <div class="news-tile">
      <div class="card-title">${c}</div>
      ${data.articles.slice(0,3).map(a => `
        <div class="news-item">
          <a href="${a.url}" target="_blank">${a.title}</a>
          <div class="news-src">${a.source}</div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

async function loadAll() {
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot';
  document.getElementById('status-text').textContent = 'SYNCING';
  
  try {
    const lat = document.getElementById('inp-lat').value || 7.2096;
    const lon = document.getElementById('inp-lon').value || 79.8378;
    const city = encodeURIComponent(document.getElementById('inp-city').value || 'Negombo');
    
    const [w, n, a] = await Promise.all([
      fetch(`${API}/api/weather?lat=${lat}&lon=${lon}&city=${city}`).then(r=>r.json()),
      fetch(`${API}/api/news`).then(r=>r.json()),
      fetch(`${API}/api/aqi?lat=${lat}&lon=${lon}`).then(r=>r.json())
    ]);

    newsData = n;
    renderWeather(w);
    renderAQI(a);
    renderNews();
    
    dot.className = 'status-dot ok';
    document.getElementById('status-text').textContent = 'SECURE LINK';
  } catch (e) {
    dot.className = 'status-dot';
    document.getElementById('status-text').textContent = 'OFFLINE';
  }
}

loadAll();
</script>
</body>
</html>
